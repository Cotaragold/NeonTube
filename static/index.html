<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON TUBE — YouTube Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="scanlines"></div>

<header>
  <h1 class="logo">NEON<span>TUBE</span></h1>
  <p class="tagline">// youtube downloader v1.0</p>
</header>

<main>
  <!-- ССЫЛКА -->
  <section class="panel url-panel">
    <div class="url-row">
      <input id="url-input" type="text" placeholder="Вставь ссылку на YouTube видео…"
             autocomplete="off" spellcheck="false">
      <button id="analyze-btn" class="btn btn-cyan">АНАЛИЗ</button>
    </div>
    <div id="url-error" class="error-msg hidden"></div>
    <details class="proxy-details">
      <summary>⚙ настройки сети (прокси)</summary>
      <div class="proxy-row">
        <input id="proxy-input" type="text"
               placeholder="socks5://127.0.0.1:1080 или http://127.0.0.1:8080 — пусто = напрямую"
               autocomplete="off" spellcheck="false">
        <button id="proxy-save" class="btn btn-cyan">OK</button>
      </div>
      <p class="proxy-hint">Если YouTube заблокирован провайдером — укажи прокси своего VPN.
        Сохраняется в <code>config.json</code>.</p>
    </details>
  </section>

  <!-- ПРЕВЬЮ -->
  <section id="preview" class="panel preview-panel hidden">
    <div class="preview-grid">
      <div class="thumb-wrap">
        <img id="thumb" alt="превью">
        <span id="duration" class="duration-badge"></span>
      </div>
      <div class="meta">
        <h2 id="title"></h2>
        <p id="channel" class="channel"></p>
        <p id="views" class="views"></p>

        <div class="controls">
          <div class="control-group">
            <label>РЕЖИМ</label>
            <div class="mode-btns" id="mode-btns">
              <button class="mode-btn active" data-mode="full">🎬 Видео + звук</button>
              <button class="mode-btn" data-mode="video">📹 Только видео</button>
              <button class="mode-btn" data-mode="audio">🎵 Только звук</button>
            </div>
          </div>
          <div class="control-group" id="quality-group">
            <label>КАЧЕСТВО</label>
            <select id="quality-select"></select>
          </div>
        </div>

        <button id="download-btn" class="btn btn-magenta big">⬇ СКАЧАТЬ</button>
      </div>
    </div>
  </section>

  <!-- ОЧЕРЕДЬ -->
  <section class="panel queue-panel">
    <div class="queue-header">
      <h3>ОЧЕРЕДЬ ЗАГРУЗОК</h3>
      <button id="clear-btn" class="btn btn-ghost">очистить завершённые</button>
    </div>
    <div id="queue-list">
      <p id="queue-empty" class="queue-empty">— пусто —</p>
    </div>
  </section>
</main>

<footer>файлы сохраняются в папку <code>downloads/</code> рядом с приложением</footer>

<script src="/static/app.js"></script>
</body>
</html>
